services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB: prompt_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d prompt_db"]
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      DEBUG: "True"
      ALLOWED_HOSTS: "*"
      DB_HOST: db
      DB_PORT: 5432
      POSTGRES_DB: prompt_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "${BACKEND_HOST_PORT:-8001}:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    environment:
      HOST: 0.0.0.0
      PORT: 5500
      BACKEND_ORIGIN: http://backend:8000
    ports:
      - "${FRONTEND_HOST_PORT:-0}:5500"
    depends_on:
      backend:
        condition: service_started

volumes:
  postgres_data:
